<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="layout.css">
</head>
<body>

<button onclick="startGame()">Start</button>
<button onclick="stopGame()">Stop</button>

<div id="area" style="width:300px;height:200px;background:gray;margin-top:20px;">
    Kliknij jak się zmieni na zielone
</div>

<p id="result"></p>

<script>
    let startTime;
    let timeoutId;
    let waiting = false;
    let results = [];
    let count = 0;

    function startGame() {
        results = [];
        count = 0;
        next();
    }

    function stopGame() {
        clearTimeout(timeoutId);
        waiting = false;
    }

    function next() {
        if (count >= 5) {
            showStats();
            return;
        }

        const delay = Math.random() * 3000 + 1000;

        timeoutId = setTimeout(() => {
            document.getElementById("area").style.background = "green";
            startTime = Date.now();
            waiting = true;
        }, delay);

        count++;
    }

    document.getElementById("area").onclick = function () {
        if (!waiting) return;

        const time = Date.now() - startTime;
        results.push(time);

        document.getElementById("area").style.background = "gray";
        waiting = false;

        next();
    };

    function showStats() {
        const min = Math.min(...results);
        const max = Math.max(...results);
        const avg = results.reduce((a, b) => a + b, 0) / results.length;

        document.getElementById("result").textContent =
            "Min: " + min + " ms | Max: " + max + " ms | Avg: " + Math.round(avg) + " ms";
    }
</script>

</body>
</html>
