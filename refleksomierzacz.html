<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Refleksomierzacz</title>
    <link rel="stylesheet" href="layout.css">
</head>
<body>

<label>Liczba prób: </label>
<input type="number" id="tries" value="5" min="1" max="20">

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="area">
    Kliknij jak się zmieni na zielone
</div>

<p id="result"></p>

<script>
    let startTime;
    let timeoutId;
    let waiting = false;
    let results = [];
    let count = 0;
    let maxTries = 5;

    function start() {
        results = [];
        count = 0;
        maxTries = parseInt(document.getElementById("tries").value);
        document.getElementById("result").textContent = "";
        next();
    }

    function stop() {
        clearTimeout(timeoutId);
        waiting = false;
    }

    function next() {
        if (count >= maxTries) {
            showResults();
            return;
        }

        const delay = Math.random() * 3000 + 1000;    // min delay: 1s, max delay: 4s

        timeoutId = setTimeout(() => {
            document.getElementById("area").style.background = "green";
            startTime = Date.now();
            waiting = true;
        }, delay);

        count++;
    }

    document.getElementById("area").onclick = function () {
        if (!waiting) return;

        const time = Date.now() - startTime;
        results.push(time);

        document.getElementById("area").style.background = "gray";
        waiting = false;

        next();
    };

    function showResults() {
        const min = Math.min(...results);
        const max = Math.max(...results);
        const avg = results.reduce((a, b) => a + b, 0) / results.length;

        document.getElementById("result").textContent =
            "Min: " + min + " ms | Max: " + max + " ms | Średnia: " + Math.round(avg) + " ms";
    }
</script>

</body>
</html>
